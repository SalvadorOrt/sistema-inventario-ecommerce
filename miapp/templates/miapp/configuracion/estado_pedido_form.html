{% extends "miapp/base.html" %}
{% block content %}
<div class="dash-wrap">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card-soft shadow-sm border-0 p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h4 class="mb-0 fw-bold">{{ modo }} Estado de Pedido</h4>
                    <a href="{% url 'miapp:estados_pedido_gestion' %}" class="btn-close"></a>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="dash-subtitle mb-1">Código del Estado</label>
                        {{ form.codigo }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="dash-subtitle mb-1">Etapa Logística (Proceso)</label>
                        {{ form.etapa }}
                        <div class="form-text small text-info">Esto define en qué sección del sistema aparecerá el pedido.</div>
                    </div>

                    <div class="mb-4">
                        <label class="dash-subtitle mb-1">Descripción</label>
                        {{ form.descripcion }}
                    </div>

                    <div class="mb-4 bg-light p-3 rounded border">
                        <div class="form-check form-switch d-flex align-items-center ps-0 m-0">
                            <div class="me-3 position-relative" style="height: 1.5em;">{{ form.es_activo }}</div>
                            <label class="form-check-label fw-bold cursor-pointer" for="{{ form.es_activo.id_for_label }}">Habilitado</label>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Guardar Estado</button>
                        <a href="{% url 'miapp:estados_pedido_gestion' %}" class="btn btn-link text-muted text-decoration-none btn-sm">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>.form-switch .form-check-input { width: 3em; height: 1.5em; margin-top: 0; cursor: pointer; float: none; vertical-align: middle; }</style>
{% endblock %}
