{% extends "miapp/base.html" %}

{% block content %}
<div class="dash-wrap">
    
    <div class="d-flex justify-content-center mt-5">
        <div class="col-12 col-lg-8">
            <div class="mb-3">
                <a href="{% url 'miapp:perfiles_consulta' %}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> Volver al listado
                </a>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                    <h4 class="fw-bold text-dark">{{ titulo }}</h4>
                    <p class="text-muted small">Complete la información del usuario.</p>
                </div>
                
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Usuario (Login)</label>
                                <input type="text" name="username" class="form-control" 
                                       value="{{ usuario_obj.username|default:'' }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Contraseña</label>
                                <input type="password" name="password" class="form-control" 
                                       placeholder="{% if usuario_obj %}Dejar vacío para mantener actual{% else %}Obligatoria para nuevos{% endif %}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Nombres</label>
                                <input type="text" name="first_name" class="form-control" 
                                       value="{{ usuario_obj.first_name|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Apellidos</label>
                                <input type="text" name="last_name" class="form-control" 
                                       value="{{ usuario_obj.last_name|default:'' }}">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label small fw-bold text-muted">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" 
                                       value="{{ usuario_obj.email|default:'' }}">
                            </div>

                            <hr class="my-4 text-muted opacity-25">

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-primary">ROL DEL SISTEMA</label>
                                <select name="rol" class="form-select" required>
                                    {% for codigo, nombre in roles %}
                                        <option value="{{ codigo }}" 
                                            {% if usuario_obj.perfil.rol_negocio == codigo %}selected{% endif %}>
                                            {{ nombre }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-primary">BODEGA ASIGNADA</label>
                                <select name="bodega" class="form-select">
                                    <option value="">-- Ninguna (Global) --</option>
                                    {% for b in bodegas %}
                                        <option value="{{ b.id }}" 
                                            {% if usuario_obj.perfil.bodega.id == b.id %}selected{% endif %}>
                                            {{ b.nombre }}
                                        </option>
                                    {% endfor %}
                                </select>
                                <div class="form-text small">Requerido para Operadores.</div>
                            </div>

                            <div class="col-12 mt-3">
                                <div class="form-check form-switch p-3 bg-light rounded-3 border">
                                    <input class="form-check-input ms-0 me-3" type="checkbox" name="es_activo" id="checkActivo"
                                           {% if not usuario_obj or usuario_obj.is_active %}checked{% endif %}>
                                    <label class="form-check-label fw-bold text-dark" for="checkActivo">Usuario Activo (Acceso permitido)</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                            <a href="{% url 'miapp:perfiles_consulta' %}" class="btn btn-light border">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5 fw-bold">{{ accion }}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
