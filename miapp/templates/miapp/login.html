{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema de Inventario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><g fill='none' stroke='currentColor' stroke-width='0.8' vector-effect='non-scaling-stroke' stroke-linecap='butt' stroke-linejoin='miter' shape-rendering='geometricPrecision'><rect x='2' y='2' width='5' height='5'/><rect x='9' y='2' width='5' height='5'/><rect x='16' y='2' width='5' height='5'/><rect x='2' y='9' width='5' height='5'/><rect x='9' y='9' width='5' height='5'/><rect x='16' y='9' width='5' height='5'/><rect x='2' y='16' width='5' height='5'/><rect x='9' y='16' width='5' height='5'/><rect x='16' y='16' width='5' height='5'/></g></svg>"
  >

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent-blue:#0071e3;
      --text-main:#111;
      --text-muted:#6e6e73;
      --border-soft:#d2d2d7;
      --bg-color: #f5f5f7; /* Color de fondo suave */
    }

    body{
      margin:0;
      font-family:'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color); /* Fondo aplicado al body */
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- ESTILOS DEL CUBO RUBIK --- */
    .cube-icon {
        transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        transform-origin: center;
        display: block;
    }

    .cube-square {
        transition: fill 0.3s ease, opacity 0.3s ease, stroke 0.3s ease;
        fill: #333;
        stroke: none;
        stroke-width: 0;
    }

    #rubikBtn { cursor: pointer; outline: none; }
    #rubikBtn:hover .cube-icon {
        transform: rotate(180deg) scale(1.1);
    }
    #rubikBtn:hover .cube-square {
        opacity: 1 !important;
    }

    /* Efecto Ola */
    .cube-square:nth-child(1) { transition-delay: 0.05s; }
    .cube-square:nth-child(2) { transition-delay: 0.10s; }
    .cube-square:nth-child(3) { transition-delay: 0.15s; }
    .cube-square:nth-child(4) { transition-delay: 0.20s; }
    .cube-square:nth-child(5) { transition-delay: 0.25s; }
    .cube-square:nth-child(6) { transition-delay: 0.30s; }
    .cube-square:nth-child(7) { transition-delay: 0.35s; }
    .cube-square:nth-child(8) { transition-delay: 0.40s; }
    .cube-square:nth-child(9) { transition-delay: 0.45s; }


    /* --- CONTENEDOR CENTRAL --- */
    .login-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* TARJETA DE LOGIN */
    .login-container{
      width:100%;
      max-width:400px; /* Un poco más ancho para que respire */
      background:#fff;
      border:1px solid var(--border-soft);
      border-radius:24px; /* Bordes más redondeados */
      padding:40px 32px;
      box-shadow:0 10px 40px rgba(0,0,0,0.08); /* Sombra más elegante */
    }

    h1{
      font-size:1.3rem;
      font-weight:700;
      text-align:center;
      margin-bottom:1.5rem;
      letter-spacing:.02em;
      text-transform:uppercase;
      color: var(--text-main);
    }

    label{
      font-size:.85rem;
      color:var(--text-muted);
      margin-bottom:6px;
      font-weight: 500;
    }

    .form-control{
      border-radius:12px;
      border:1px solid var(--border-soft);
      padding: 10px 12px;
      font-size:.95rem;
    }
    .form-control:focus{
      border-color:var(--accent-blue);
      box-shadow:0 0 0 4px rgba(0,113,227,0.15); /* Focus ring estilo Apple */
    }

    .btn-primary{
      background-color:var(--accent-blue);
      border-color:var(--accent-blue);
      border-radius:12px;
      padding:10px 0;
      font-size:1rem;
      font-weight:600;
      margin-top: 10px;
      transition: all 0.2s ease;
    }
    .btn-primary:hover{ 
        background-color:#005bbd; 
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }

    /* MENSAJES */
    .messages{
      padding:10px 14px;
      border-radius:12px;
      font-size:.85rem;
      font-weight:500;
      margin-bottom:1.5rem;
    }
    .messages .error{ background:#ffecec; border-left:4px solid #dc3545; color:#842029; padding:10px 12px; border-radius:10px; }
    .messages .warning{ background:#fff4e5; border-left:4px solid #ffc107; color:#664d03; padding:10px 12px; border-radius:10px; }
    .messages .success{ background:#e9f7ef; border-left:4px solid #198754; color:#0f5132; padding:10px 12px; border-radius:10px; }
    .messages .info{ background:#e8f2ff; border-left:4px solid var(--accent-blue); color:#003a75; padding:10px 12px; border-radius:10px; }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-container">
      
      <div class="d-flex justify-content-center mb-4">
          <button id="rubikBtn" class="border-0 bg-transparent p-0" type="button">
              <svg class="cube-icon" width="40" height="40" viewBox="0 0 24 24">
                  <rect class="cube-square" x="3" y="3" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="9.5" y="3" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="16" y="3" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="3" y="9.5" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="9.5" y="9.5" width="5" height="5" rx="1" opacity="1"/>
                  <rect class="cube-square" x="16" y="9.5" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="3" y="16" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="9.5" y="16" width="5" height="5" rx="1" opacity="0.8"/>
                  <rect class="cube-square" x="16" y="16" width="5" height="5" rx="1" opacity="0.8"/>
              </svg>
          </button>
      </div>

      <h1>Iniciar sesión</h1>

      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="{{ message.tags|default:'info' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label for="id_correo">Usuario</label>
          <input
            type="email"
            id="id_correo"
            name="correo"
            class="form-control"
            autocomplete="username"
            required
          
          >
        </div>

        <div class="mb-4">
          <label for="id_password">Contraseña</label>
          <input
            type="password"
            id="id_password"
            name="password"
            class="form-control"
            autocomplete="current-password"
            required
          
          >
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Ingresar
        </button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById('rubikBtn');
        const squares = document.querySelectorAll('.cube-square');
        const rubikColors = ['#FFFFFF', '#FFD500', '#009CDA', '#009B48', '#B90000', '#FF5800'];

        function randomizeCube() {
            squares.forEach(square => {
                const randomColor = rubikColors[Math.floor(Math.random() * rubikColors.length)];
                square.style.fill = randomColor;
                if (randomColor === '#FFFFFF') {
                    square.style.stroke = '#ccc'; square.style.strokeWidth = '1px';
                } else {
                    square.style.stroke = 'none';
                }
            });
        }
        
        if(btn){
            btn.addEventListener('mouseenter', randomizeCube);
            btn.addEventListener('click', randomizeCube);
            btn.addEventListener('mouseleave', function() {
                squares.forEach(square => {
                    square.style.fill = '#333'; square.style.stroke = 'none';
                });
            });
        }
    });
  </script>
</body>
</html>
